<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,
  initial-scale=1.0">
  <title>My Website</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  
  <!-- Menu Icon -->
  <div id="menu-icon" class="menu-icon">&#9776;</div>

  <!-- Sidebar Menu -->
  <div id="sidebar" class="sidebar">
    <ul>
      <li id="study-room-option">Virtual Study Room</li>
      <li id="holiday-finder-option">Holiday Finder</li>
    </ul>
  </div>

  <!-- Main Content Area -->
  <div id="main-content" class="main-content">
    
    
  <div id="content-placeholder"></div>
  </div>

  <!-- Audio Elements for Alarm and Background Music -->
  <audio id="alarmSound" src="assets/sounds/alarm.mp3" preload="auto"></audio>
  <audio id="backgroundMusic" src="assets/sounds/study-music.mp3" loop preload="auto"></audio>
  <audio id="silenceSound" src="assets/sounds/silence.mp3" loop preload="auto"></audio>

  <script src="main.js" type="module"></script>
</body>
</html>
